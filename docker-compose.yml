services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: procurement
      POSTGRES_USER: procurement
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U procurement"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
