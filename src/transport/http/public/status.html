<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Procurement Agent — System</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="/assets/app.css" rel="stylesheet" />
  </head>
  <body>
    <div id="tb-chrome"></div>

    <main class="tb-main">
      <div class="container" style="max-width: 960px;">
        <header class="tb-page-header">
          <div>
            <h1><i class="bi bi-activity me-2"></i>System status</h1>
            <p>A live snapshot of system health. Agent connectivity is inferred from recent webhook activity.</p>
          </div>
          <button id="tb-refresh" class="btn btn-outline-secondary btn-sm" title="Reload now">
            <i class="bi bi-arrow-clockwise me-1"></i>Refresh
          </button>
        </header>

        <section id="tb-status-banner" class="tb-status-banner" aria-live="polite"></section>
        <section id="tb-status-grid" class="tb-status-grid" aria-live="polite"></section>

        <p class="text-body-secondary small mt-3 mb-0">
          Auto-refreshes every 5 seconds. Shows what the server can observe directly — external agents and tunnels are inferred from activity.
        </p>
      </div>
    </main>

    <footer class="tb-footer">
      <div class="container">
        Procurement Agent · <a href="/" class="link-secondary">Dashboard</a>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.0/dist/purify.min.js"></script>
    <script type="module" src="/assets/status.js"></script>
  </body>
</html>
