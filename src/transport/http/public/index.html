<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Procurement Agent — Dashboard</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="/assets/app.css" rel="stylesheet" />
  </head>
  <body>
    <a href="#pr-list" class="visually-hidden-focusable btn btn-primary position-absolute top-0 start-0 m-2">Skip to purchase requests</a>
    <div id="tb-chrome"></div>

    <main class="tb-main" aria-labelledby="tb-page-title">
      <div class="container">
        <header class="tb-page-header">
          <div>
            <h1 id="tb-page-title"><i class="bi bi-speedometer2 me-2" aria-hidden="true"></i>Purchase Requests</h1>
            <p>Create, track, and manage procurement requests</p>
          </div>
          <a href="/procurement-new.html" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>New Purchase Request
          </a>
        </header>

        <!-- Summary stat cards -->
        <section class="tb-stats" id="pr-stats" aria-label="Summary statistics"></section>

        <!-- Toolbar: filters, search, sort -->
        <section class="tb-toolbar" id="pr-toolbar" aria-label="PR filters"></section>

        <!-- PR card list -->
        <section id="pr-list" aria-label="Purchase requests" aria-busy="true"></section>

        <nav id="pr-pagination" class="tb-pagination" aria-label="PR list pagination"></nav>
      </div>
    </main>

    <footer class="tb-footer">
      <div class="container">
        Procurement Agent · <a href="https://modelcontextprotocol.io" target="_blank" rel="noreferrer" class="link-secondary">Model Context Protocol</a>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/assets/procurement.js"></script>
  </body>
</html>
