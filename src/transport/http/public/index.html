<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MCP Taskbridge — Tasks</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="/assets/app.css" rel="stylesheet" />
  </head>
  <body>
    <div id="tb-chrome"></div>

    <main class="tb-main">
      <div class="container">
        <header class="tb-page-header">
          <div>
            <h1><i class="bi bi-list-task me-2"></i>Tasks</h1>
            <p>Submit a task, then let any MCP client (Claude Desktop, Claude Cowork, Claude Code, …) handle it.</p>
          </div>
        </header>

        <section class="tb-submit-card">
          <form id="tb-form">
            <label for="tb-prompt" class="tb-section-label">New task</label>
            <textarea
              id="tb-prompt"
              class="form-control mb-2"
              rows="3"
              placeholder="e.g. research current NVDA stock price from 3 sources and summarize"
              required></textarea>
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
              <span class="text-body-secondary small">
                <i class="bi bi-info-circle me-1"></i>
                Enter to newline, click Submit to queue.
              </span>
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-send me-1"></i>Submit
              </button>
            </div>
          </form>
        </section>

        <section id="tb-toolbar" class="tb-toolbar" aria-label="Task filters"></section>

        <section id="tb-list" aria-live="polite"></section>

        <nav id="tb-pagination" class="tb-pagination" aria-label="Pagination"></nav>
      </div>
    </main>

    <footer class="tb-footer">
      <div class="container">
        mcp-taskbridge · <a href="https://modelcontextprotocol.io" target="_blank" rel="noreferrer" class="link-secondary">Model Context Protocol</a>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.0/dist/purify.min.js"></script>
    <script type="module" src="/assets/tasks.js"></script>
  </body>
</html>
