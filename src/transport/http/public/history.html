<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Procurement Agent — Purchase History</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="/assets/app.css" rel="stylesheet" />
  </head>
  <body>
    <div id="tb-chrome"></div>

    <main class="tb-main" aria-labelledby="tb-page-title">
      <div class="container">
        <header class="tb-page-header">
          <div>
            <h1 id="tb-page-title"><i class="bi bi-clock-history me-2" aria-hidden="true"></i>Purchase History</h1>
            <p>Browse completed purchase requests and historical pricing data.</p>
          </div>
        </header>

        <!-- Toolbar -->
        <section class="tb-toolbar" aria-label="History filters">
          <div class="tb-search">
            <i class="bi bi-search" aria-hidden="true"></i>
            <label for="history-material" class="visually-hidden">Search by material</label>
            <input id="history-material" type="search" class="form-control"
                   placeholder="Search by material name..." />
          </div>
          <div>
            <label for="history-vendor" class="visually-hidden">Filter by vendor</label>
            <select id="history-vendor" class="form-select form-select-sm">
              <option value="">All vendors</option>
            </select>
          </div>
          <button id="history-refresh" class="tb-icon-btn" title="Reload" aria-label="Reload history">
            <i class="bi bi-arrow-clockwise" aria-hidden="true"></i>
          </button>
        </section>

        <!-- Results -->
        <section id="history-list" aria-label="Purchase history" aria-busy="true"></section>
      </div>
    </main>

    <footer class="tb-footer">
      <div class="container">
        Procurement Agent · <a href="/" class="link-secondary">Dashboard</a>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/assets/history.js"></script>
  </body>
</html>
