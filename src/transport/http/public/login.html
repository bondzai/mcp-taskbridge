<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Sign in — Procurement Agent</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="/assets/app.css" rel="stylesheet" />
  </head>
  <body>
    <div class="tb-login-page">
      <div class="tb-login-card">
        <div class="text-center mb-4">
          <div class="mb-2" style="font-size:2rem"><i class="bi bi-cart3"></i></div>
          <h1 class="h4 fw-semibold mb-1">Procurement Agent</h1>
          <p class="text-body-secondary small mb-0">Sign in to continue</p>
        </div>

        <form id="tb-login-form" novalidate>
          <div class="mb-3">
            <label for="tb-username" class="form-label small">Username</label>
            <input type="text" id="tb-username" class="form-control" autocomplete="username" autofocus required />
          </div>
          <div class="mb-3">
            <label for="tb-password" class="form-label small">Password</label>
            <input type="password" id="tb-password" class="form-control" autocomplete="current-password" required />
          </div>
          <div id="tb-login-error" class="tb-login-error" role="alert" aria-live="polite"></div>
          <button type="submit" class="btn btn-primary w-100 mt-1">
            <i class="bi bi-box-arrow-in-right me-1"></i>Sign in
          </button>
        </form>

        <p class="text-center mt-3 mb-0" style="color: var(--tb-muted); font-size: 0.75rem; opacity: 0.7;">
          Demo: <code>admin</code> / <code>admin</code>
        </p>
      </div>
    </div>

    <script type="module" src="/assets/login.js"></script>
  </body>
</html>
