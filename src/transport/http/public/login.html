<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 16 16%27><rect width=%2716%27 height=%2716%27 rx=%274%27 fill=%27%23dc2626%27/><g transform=%27translate(2,2) scale(0.75)%27 fill=%27white%27><path d=%27M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .49.598l-1 5a.5.5 0 0 1-.465.401l-9.397.472L4.415 11H13a.5.5 0 0 1 0 1H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5zM3.102 4l.84 4.479 9.144-.459L13.89 4H3.102zM5 12a2 2 0 1 0 0 4 2 2 0 0 4zm7 0a2 2 0 1 0 0 4 2 2 0 0 4zm-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2z%27/></g></svg>" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Sign in — Procurement Agent</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="/assets/app.css" rel="stylesheet" />
  </head>
  <body>
    <div class="tb-login-page">
      <div class="tb-login-card">
        <div class="text-center mb-4">
          <div class="mb-2"><span class="tb-mark tb-mark-lg" aria-hidden="true"></span></div>
          <h1 class="h4 fw-semibold mb-1">procurement-core</h1>
          <p class="text-body-secondary small mb-0">Sign in to continue</p>
        </div>

        <form id="tb-login-form" novalidate>
          <div class="mb-3">
            <label for="tb-username" class="form-label small">Username</label>
            <input type="text" id="tb-username" class="form-control" autocomplete="username" autofocus required />
          </div>
          <div class="mb-3">
            <label for="tb-password" class="form-label small">Password</label>
            <input type="password" id="tb-password" class="form-control" autocomplete="current-password" required />
          </div>
          <div id="tb-login-error" class="tb-login-error" role="alert" aria-live="polite"></div>
          <button type="submit" class="btn btn-primary w-100 mt-1">
            <i class="bi bi-box-arrow-in-right me-1"></i>Sign in
          </button>
        </form>

        <p class="text-center mt-3 mb-0" style="color: var(--tb-muted); font-size: 0.75rem; opacity: 0.7;">
          Demo: <code>admin</code> / <code>admin</code>
        </p>
      </div>
    </div>

    <script type="module" src="/assets/login.js"></script>
  </body>
</html>
