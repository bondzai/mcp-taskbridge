<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Procurement Agent — PR Detail</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="/assets/app.css" rel="stylesheet" />
  </head>
  <body>
    <div id="tb-chrome"></div>

    <main class="tb-main" aria-labelledby="tb-page-title">
      <div class="container" style="max-width: 960px;">
        <header class="tb-page-header tb-sticky-header">
          <div>
            <h1 id="tb-page-title"><i class="bi bi-cart3 me-2" aria-hidden="true"></i>Purchase Request</h1>
            <p id="pr-subtitle" class="mb-0 text-body-secondary">Loading...</p>
          </div>
          <a href="/" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
          </a>
        </header>

        <!-- Loading skeleton -->
        <div id="pr-loading" aria-live="polite">
          <div class="tb-skeleton-list" aria-hidden="true">
            <div class="tb-skeleton-card">
              <div class="tb-skeleton-line tb-skeleton-line-sm"></div>
              <div class="tb-skeleton-line tb-skeleton-line-lg"></div>
              <div class="tb-skeleton-line tb-skeleton-line-md"></div>
            </div>
          </div>
        </div>

        <!-- Error state -->
        <div id="pr-error" class="d-none">
          <div class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i>
            <span id="pr-error-msg">Failed to load purchase request.</span>
          </div>
        </div>

        <!-- Main content (hidden until loaded) -->
        <div id="pr-content" class="d-none">
          <!-- PR header card with actions -->
          <section class="tb-submit-card mb-3" id="pr-header-card" aria-label="PR details"></section>

          <!-- Action buttons -->
          <section id="pr-actions" class="d-flex flex-wrap gap-2 mb-3" aria-label="PR actions"></section>

          <!-- Tab navigation -->
          <div class="tb-tabs" role="tablist" aria-label="PR sections">
            <button class="tb-tab active" role="tab" aria-selected="true" data-tab="timeline">Timeline</button>
            <button class="tb-tab" role="tab" aria-selected="false" data-tab="items">Items</button>
            <button class="tb-tab" role="tab" aria-selected="false" data-tab="sourcing">Sourcing</button>
            <button class="tb-tab" role="tab" aria-selected="false" data-tab="rfq">RFQ</button>
            <button class="tb-tab" role="tab" aria-selected="false" data-tab="quotes">Quotes</button>
          </div>

          <!-- Tab panels -->
          <div class="tb-tab-panel active" id="panel-timeline" role="tabpanel">
            <section id="pr-timeline-section" class="tb-submit-card" aria-label="Status timeline">
              <div class="tb-section-label mb-2">Status Timeline</div>
              <div id="pr-timeline"></div>
            </section>
          </div>

          <div class="tb-tab-panel" id="panel-items" role="tabpanel">
            <section id="pr-items-section" class="tb-submit-card" aria-label="Line items">
              <div class="tb-section-label mb-2">Line Items</div>
              <div id="pr-items-table"></div>
            </section>
          </div>

          <div class="tb-tab-panel" id="panel-sourcing" role="tabpanel">
            <section id="pr-shortlist-section" class="tb-submit-card" aria-label="Vendor shortlist">
              <div class="tb-section-label mb-2">Vendor Shortlist</div>
              <div id="pr-shortlist"></div>
            </section>
          </div>

          <div class="tb-tab-panel" id="panel-rfq" role="tabpanel">
            <section id="pr-rfq-section" class="tb-submit-card" aria-label="RFQ status">
              <div class="tb-section-label mb-2">RFQ Status</div>
              <div id="pr-rfq-status"></div>
            </section>
          </div>

          <div class="tb-tab-panel" id="panel-quotes" role="tabpanel">
            <section id="pr-comparison-section" class="tb-submit-card" aria-label="Quote comparison">
              <div class="tb-section-label mb-2">Quote Comparison</div>
              <div id="pr-comparison"></div>
            </section>
          </div>
        </div>
      </div>
    </main>

    <!-- Reject reason modal -->
    <div class="modal fade" id="pr-reject-modal" tabindex="-1" aria-hidden="true" aria-labelledby="pr-reject-title">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="pr-reject-title">
              <i class="bi bi-x-circle me-2"></i>Reject Purchase Request
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <label for="pr-reject-reason" class="form-label">Reason for rejection</label>
            <textarea class="form-control" id="pr-reject-reason" rows="3"
                      placeholder="Explain why this PR is being rejected..."></textarea>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-danger" id="pr-reject-confirm">
              <i class="bi bi-x-circle me-1"></i>Reject
            </button>
          </div>
        </div>
      </div>
    </div>

    <footer class="tb-footer">
      <div class="container">
        Procurement Agent · <a href="/" class="link-secondary">Dashboard</a>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/assets/procurement-detail.js"></script>
  </body>
</html>
